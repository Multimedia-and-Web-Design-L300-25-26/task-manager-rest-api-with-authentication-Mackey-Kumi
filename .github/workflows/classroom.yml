name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: npm install
    - name: Create .env.test
      run: |
        echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env.test
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.test
    - name: Run Backend Tests
      id: run-backend-tests
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Run Backend Tests
        setup-command: ''
        command: npm test
        timeout: 10
        max-score: 100
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        RUN-BACKEND-TESTS_RESULTS: "${{steps.run-backend-tests.outputs.result}}"
      with:
        runners: run-backend-tests
